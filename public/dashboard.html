<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kasir AI - Dashboard Overview</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <!-- Top Header Bar -->
  <div class="top-header">
    <div class="logo">🛒 Kasir AI</div>
  </div>
  <div class="header-spacer"></div>

  <div class="sidebar">
    <h2>Menu</h2>
    <ul>
      <li><a href="/" class="">🏠 Home</a></li>
      <li><a href="/barang" class="">📦 Barang</a></li>
      <li><a href="/dashboard" class="active">📊 Dashboard</a></li>
      <li><a href="/api/orders" onclick="event.preventDefault(); alert('Halaman Orders belum tersedia')">🧾 Orders</a></li>
    </ul>
  </div>

  <div class="main">
    <div class="main-header">
      <h1>📊 Dashboard Overview</h1>
    </div>

    <!-- Alert (for any messages) -->
    <div id="alert" class="alert"></div>

    <!-- Statistics Cards -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card primary">
        <h3>Total Produk</h3>
        <div class="value" id="statProducts">-</div>
        <div class="sub">Dari database</div>
      </div>
      <div class="stat-card success">
        <h3>Total Orders</h3>
        <div class="value" id="statOrders">-</div>
        <div class="sub">Transaksi</div>
      </div>
      <div class="stat-card warning">
        <h3>Rata-rata Harga</h3>
        <div class="value" id="statAvgPrice">-</div>
        <div class="sub">Per produk</div>
      </div>
    </div>

    <!-- Chart -->
    <div class="chart-container">
      <h2>📈 Kategori Produk</h2>
      <div class="chart-wrapper">
        <canvas id="categoryChart"></canvas>
      </div>
    </div>

    <!-- Recent Orders -->
    <div class="recent-orders">
      <h2>🧾 Recent Orders</h2>
      <table class="recent-table">
        <thead>
          <tr>
            <th>Order Code</th>
            <th>Produk</th>
            <th>Qty</th>
            <th>Waktu</th>
          </tr>
        </thead>
        <tbody id="recentOrdersBody">
          <tr><td colspan="4" class="empty-state">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="/js/dashboard.js"></script>
</body>
</html>
